basePath: /
definitions:
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.AuthPayload:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.JWKResponse:
    properties:
      alg:
        type: string
      e:
        type: string
      kid:
        type: string
      kty:
        type: string
      "n":
        type: string
      use:
        type: string
    type: object
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.JWKSResponse:
    properties:
      keys:
        items:
          $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.JWKResponse'
        type: array
    type: object
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.RefreshPayload:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.TokenResponse:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
    type: object
  github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.UserResponse:
    properties:
      email:
        type: string
      id:
        type: string
    type: object
  response.ErrorBody:
    properties:
      code:
        type: string
      details:
        items:
          $ref: '#/definitions/response.ErrorDetail'
        type: array
      message:
        type: string
    type: object
  response.ErrorDetail:
    properties:
      code:
        type: string
      field:
        type: string
      message:
        type: string
    type: object
  response.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
    type: object
  response.SuccessResponse:
    properties:
      data: {}
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is an authentication service API.
  title: Auth API
  version: "1.0"
paths:
  /.well-known/jwks.json:
    get:
      description: Get the JSON Web Key Set for token validation by external services
      produces:
      - application/json
      responses:
        "200":
          description: JWKS
          schema:
            $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.JWKSResponse'
      tags:
      - auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get access and refresh tokens
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.AuthPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.TokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      tags:
      - auth
  /auth/login/ldap:
    post:
      consumes:
      - application/json
      description: Login with email/username and password via LDAP to get access and
        refresh tokens
      parameters:
      - description: LDAP Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.AuthPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.TokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      tags:
      - auth
  /auth/me:
    get:
      description: Get current user information based on JWT token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.UserResponse'
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      security:
      - BearerAuth: []
      tags:
      - auth
  /auth/panic:
    get:
      description: Intentionally panics to test the recovery middleware
      produces:
      - application/json
      responses: {}
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Get a new access token using a valid refresh token
      parameters:
      - description: Refresh request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.RefreshPayload'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.TokenResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with email and password
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.AuthPayload'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_f0bima_go-auth-starter_internal_feature_auth_delivery_http_dto.UserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      tags:
      - auth
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
