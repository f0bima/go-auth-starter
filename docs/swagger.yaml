basePath: /
definitions:
  auth.AuthRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
      - email
      - password
    type: object
  auth.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
      - refresh_token
    type: object
  jwt.JWK:
    properties:
      alg:
        type: string
      e:
        type: string
      kid:
        type: string
      kty:
        type: string
      'n':
        type: string
      use:
        type: string
    type: object
  jwt.JWKS:
    properties:
      keys:
        items:
          $ref: '#/definitions/jwt.JWK'
        type: array
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is an authentication service API.
  title: Auth API
  version: '1.0'
paths:
  /.well-known/jwks.json:
    get:
      description: Get the JSON Web Key Set for token validation by external services
      produces:
        - application/json
      responses:
        '200':
          description: JWKS
          schema:
            $ref: '#/definitions/jwt.JWKS'
      tags:
        - auth
  /auth/login:
    post:
      consumes:
        - application/json
      description: Login with email and password to get access and refresh tokens
      parameters:
        - description: Login request
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/auth.AuthRequest'
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        '401':
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      tags:
        - auth
  /auth/refresh:
    post:
      consumes:
        - application/json
      description: Get a new access token using a refresh token
      parameters:
        - description: Refresh token request
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/auth.RefreshRequest'
      produces:
        - application/json
      responses:
        '200':
          description: OK
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        '401':
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      tags:
        - auth
  /auth/register:
    post:
      consumes:
        - application/json
      description: Register a new user with email and password
      parameters:
        - description: Register request
          in: body
          name: request
          required: true
          schema:
            $ref: '#/definitions/auth.AuthRequest'
      produces:
        - application/json
      responses:
        '201':
          description: Created
          schema:
            additionalProperties: true
            type: object
        '400':
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      tags:
        - auth
swagger: '2.0'
